version: '3.8'

services:
  backend:
    build: ./backend
    container_name: housekeeper-backend
    restart: always
    ports:
      - "3002:3002"
    depends_on:
      - db
    environment:
      - PORT=3002
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=admin
      - DB_PASSWORD=secret
      - DB_NAME=housekeeper
      - JWT_SECRET=mysecretkey
    volumes:
      - ./backend:/app
      - /app/node_modules

  mobile:
    build: ./mobile
    container_name: housekeeper-mobile
    restart: always
    ports:
      - "8081:8081"
    volumes:
      - ./mobile:/app
      - /app/node_modules
    stdin_open: true
    tty: true

  db:
    image: postgres:latest
    container_name: housekeeper-db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: housekeeper
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
